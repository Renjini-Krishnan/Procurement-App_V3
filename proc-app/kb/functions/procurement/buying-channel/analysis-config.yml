# =============================================================================
# Buying Channel — Analysis Configuration
# =============================================================================
# Engine-config layer for the Buying Channel pillar. Declarative. The engine
# reads this file to know HOW to route POs to recommended channels. Changes to
# thresholds / rules / channel definitions require no code change.
#
# Edit-risk tags (LOW / MEDIUM / HIGH) drive the KB Editor UI:
#   LOW    = self-edit (display, text)
#   MEDIUM = peer KB-lead review (thresholds, derivation logic)
#   HIGH   = partner approval (rules, recommendations, benchmarks)
# =============================================================================

metadata:
  id: buying-channel-analysis-config
  layer: function
  function: procurement
  pillar: buying-channel
  version: 2.0
  last_updated: 2026-05-27
  status: active

# =============================================================================
# PILLAR-LEVEL CONFIGURATION
# =============================================================================

pillar:
  id: buying-channel
  display_name: "Buying Channel"
  scope_note: |
    How spend flows from PR to PO — the right buying channel per material group.
    For each MG: classify spend archetype (BULK / DIRECT / INDIRECT / SERVICE / CAPEX,
    from Stage 9) → apply data-driven rules (frequency + value + vendor signals) →
    recommend channel (RC-LT / OLA / Catalogue / ASL / RFQ / Single-Tender).
    Outputs are operational (TAT, buyer-bandwidth, contract coverage lift), not ₹.
  run_order: 14   # Stage 14 — Buying Channel
  themes_in_order: [buying-channel-strategy]   # Single theme (no decomposition)
  synthesis_runs_after_themes: false   # Single theme — no cross-theme synthesis needed

  # No pillar maturity rollup. Theme scored individually; no weighted-average.
  pillar_maturity_rollup: false

# =============================================================================
# THEME (1) — Buying Channel Strategy
# =============================================================================

themes:

  buying-channel-strategy:
    display_name: "Buying Channel Strategy"
    deep_dive_file: "buying-channel/buying-channel-strategy.md"
    overview_file: "buying-channel/framework-overview.md"   # consultant-facing methodology explainer

    # 13 components (BC1-BC13) across the 4-question framework
    components:

      # Q1 — WHAT IS the channel state today? (Baseline)
      - id: bc1_portfolio_channel_mix_today
        question_group: Q1
        decision_driving: false
      - id: bc2_per_mg_current_profile
        question_group: Q1
        decision_driving: false
      - id: bc3_archetype_channel_heatmap
        question_group: Q1
        decision_driving: false

      # Q2 — WHERE COULD we route differently? (Opportunity)
      - id: bc4_recommended_channel_per_mg
        question_group: Q2
        decision_driving: true
        rule_set: buying_channel.recommendation_rules
      - id: bc5_match_status_per_mg
        question_group: Q2
        decision_driving: true
      - id: bc6_migration_opportunities_by_target_channel
        question_group: Q2
        decision_driving: true
      - id: bc7_cross_plant_aggregation_opportunity
        question_group: Q2
        decision_driving: true
        cross_pillar_handoff: op-model.centralisation

      # Q3 — WHICH MGs won't move? (Feasibility filter)
      - id: bc8_sole_source_risk_categories
        question_group: Q3
        decision_driving: true
        sub_signals: [single_vendor, concentrated, pac_justified]
      - id: bc9_project_one_off_exclusion
        question_group: Q3
        decision_driving: false
      - id: bc10_unclassified_mgs
        question_group: Q3
        decision_driving: false
        cross_pillar_handoff: material-master

      # Q4 — HOW MUCH at stake? (Quantification)
      - id: bc11_tat_savings_estimate
        question_group: Q4
        decision_driving: true
        skip_logic: "Skip if PR dump unavailable OR PR-PO join < 70%"
      - id: bc12_buyer_bandwidth_freed
        question_group: Q4
        decision_driving: true
      - id: bc13_contract_coverage_lift_estimate
        question_group: Q4
        decision_driving: true

    benchmarks_consumed:
      - id: buying_channel.portfolio.contracted_pct_typical
      - id: buying_channel.portfolio.contracted_pct_bic
      - id: buying_channel.portfolio.catalogue_penetration_typical
      - id: buying_channel.portfolio.ola_share_typical
      - id: buying_channel.portfolio.rc_lt_share_bulk_typical
      - id: buying_channel.tat.rc_lt_days
      - id: buying_channel.tat.ola_days
      - id: buying_channel.tat.catalogue_days
      - id: buying_channel.tat.asl_days
      - id: buying_channel.tat.rfq_days

    industry_overlays_consumed:
      - file_pattern: "industries/<ind>/by-function/procurement/buying-channel/benchmarks.yml"
      - file_pattern: "industries/<ind>/by-function/procurement/buying-channel/archetype-overrides.yml"
        applied_in: [bc4_recommended_channel_per_mg]

    qre_consumed:
      - Q-BC-01   # Channels in use
      - Q-BC-02   # Decision matrix / routing
      - Q-BC-03   # RC / ARC coverage
      - Q-BC-04   # OLA usage
      - Q-BC-05   # Catalogue mechanism
      - Q-BC-06   # MRP / Auto-PO
      - Q-BC-07   # Spot / emergency buying
      - Q-BC-08   # Contract types
      - Q-BC-09   # Contract compliance monitoring
      - Q-BC-10   # Category-channel matrix (workshop)
      - Q-BC-11   # Quotation requirements
      - Q-BC-12   # PAC prevalence + reasons
      - Q-BC-13   # DoA matrix
      - Q-BC-14   # Compliance checks

# =============================================================================
# CHANNEL DEFINITIONS — used throughout the pillar
# =============================================================================

channels:
  - id: rc_long_term_contract
    label: "RC — Long-Term Contract"
    short_label: "RC-LT"
    contracted: true
    benchmark_tat_days: 3   # config metric: buying_channel.tat.rc_lt_days
    typical_archetype: BULK
    description: "Multi-year volume agreement with index-linked pricing"
    edit_risk: HIGH

  - id: rc_outline_agreement
    label: "RC — Outline Agreement (OLA)"
    short_label: "OLA"
    contracted: true
    benchmark_tat_days: 3
    typical_archetype: [INDIRECT, SERVICE]
    description: "Annual blanket order with pre-agreed terms; call-offs without fresh negotiation"
    edit_risk: HIGH

  - id: rc_rop_catalogue
    label: "RC — ROP / Catalogue"
    short_label: "Catalogue"
    contracted: true
    benchmark_tat_days: 1
    typical_archetype: INDIRECT
    description: "Reorder-point system or internal catalogue; zero-touch ordering for standard stores items"
    edit_risk: HIGH

  - id: asl
    label: "ASL — Approved Supplier List"
    short_label: "ASL"
    contracted: false
    benchmark_tat_days: 25
    typical_archetype: DIRECT
    description: "Pre-qualified vendor pool; competitive among qualified suppliers"
    edit_risk: HIGH

  - id: rfq_tendering
    label: "RFQ / Tendering"
    short_label: "RFQ"
    contracted: false
    benchmark_tat_days: 70   # midpoint of 45-90 day band
    typical_archetype: [SERVICE, CAPEX, UNCLASSIFIED]
    description: "Open or limited competitive bidding for each purchase event"
    edit_risk: HIGH

  - id: single_tender_pac
    label: "Single Tender / PAC"
    short_label: "PAC"
    contracted: false
    benchmark_tat_days: null   # varies
    typical_archetype: any
    description: "Sole-source with documented justification (Proprietary / Approved / Credibility)"
    edit_risk: HIGH

# =============================================================================
# PER-ARCHETYPE THRESHOLDS — the routing engine inputs
# =============================================================================

archetype_thresholds:

  direct:
    high_value_avg_po_inr:
      value: 5000000   # ₹50,00,000 (₹50L)
      edit_risk: MEDIUM
      rationale: "Above this: primary-vendor RC-LT pays off (refractories, mill rolls, electrodes). Below: panel ASL sufficient."

  indirect:
    low_value_avg_po_inr:
      value: 50000     # ₹50,000
      edit_risk: MEDIUM
      rationale: "Catalogue / ROP threshold. Standard stores items (bearings, fasteners, PPE, stationery)."
    medium_value_avg_po_inr:
      value: 500000    # ₹5,00,000 (₹5L)
      edit_risk: MEDIUM
      rationale: "OLA upper bound. ₹50K-₹5L = recurring MRO too varied for catalogue. Above ₹5L: one-off engineered → ASL/RFQ."

  service:
    high_value_avg_po_inr:
      value: 500000    # ₹5,00,000 (₹5L)
      edit_risk: MEDIUM
      rationale: "Above + low frequency → project (RFQ). Below + recurring → OLA. Split between small AMC/housekeeping and engineering/construction projects."

  bulk:
    full_ltc_threshold_total_spend_inr_cr:
      value: 5   # ₹5 Cr / year (on TOTAL category spend, not avg PO)
      edit_risk: MEDIUM
      rationale: "Above: full multi-year LTC with index pricing. Below: annual quote / small tender."

  capex:
    # No threshold — always RFQ. Archetype rule overrides.
    note: "CAPEX always routes to RFQ regardless of value or frequency."

# Frequency threshold — universal across archetypes
frequency_thresholds:
  high_freq_po_count_6mo_threshold:
    value: 5   # > 5 POs in any 6-month window
    edit_risk: MEDIUM
    rationale: "Rolling 6-month window. Catches both 'recurring throughout the year' and 'concentrated burst' patterns. Universal across archetypes — same threshold works for BULK, INDIRECT, SERVICE, DIRECT."
  low_freq_po_count_6mo_threshold:
    value: 2
    edit_risk: MEDIUM
    rationale: "≤ 2 POs in 6 months → one-off / sporadic demand."
  frequency_window_months:
    value: 6
    edit_risk: LOW
    rationale: "Rolling window size for frequency analysis."

# Strategic-attention flag — separate from routing thresholds
strategic_attention_flag:
  strategic_attention_po_inr:
    value: 10000000   # ₹1 Cr
    edit_risk: MEDIUM
    rationale: "POs at or above this value trigger 'strategic attention' flag for executive reporting + top-N analysis. NOT used in BC4 routing (per-archetype thresholds drive routing); separate signal for prioritisation + escalation."

# =============================================================================
# CHANNEL DERIVATION — how the engine identifies the CURRENT channel of a PO
# =============================================================================

channel_derivation:
  # Priority order — first match wins. Used in BC2 to label current_channel per MG.
  contracted_field_priority_order:
    - field: Contract_Number
      maps_to: rc_long_term_contract   # default; can be refined via contract master if available
      edit_risk: HIGH
      rationale: "If Contract_Number is non-blank, PO is contracted. Default assumption: RC-LT unless contract master indicates OLA/Catalogue."
    - field: Outline_Agreement
      maps_to: rc_outline_agreement
      edit_risk: HIGH
    - field: Scheduling_Agreement
      maps_to: rc_rop_catalogue
      edit_risk: HIGH
    - field: Short_Text_heuristic
      regex: "/ARC|agreement|contract|reference/i"
      maps_to: rc_outline_agreement   # default; low-confidence flag
      edit_risk: MEDIUM
      confidence: LOW
      flag: "Heuristic match — flag for consultant review"
    - field: else
      maps_to: spot_uncontracted
      edit_risk: LOW

  contracted_pct_bands:
    largely_contracted_min_pct: 80
    partially_contracted_min_pct: 40
    minimally_contracted_min_pct: 1
    # 0% → Spot / Uncontracted
    edit_risk: MEDIUM

# =============================================================================
# CHANNEL RECOMMENDATION RULES (BC4)
# =============================================================================
# Engine evaluates rules in order. First matching rule wins per MG.
# Rules use per-archetype thresholds defined above.
# All rules are HIGH edit-risk — changes affect recommendations engine-wide.

recommendation_rules:

  - rule_id: R1_pac_override
    priority: 1
    archetype: any
    condition: "pac_pct >= pac_high_threshold_pct"   # default 50%
    recommend_channel: single_tender_pac
    flag: "Sole-source dependency — vendor development action recommended"
    rationale: "PAC override regardless of archetype: if >50% of POs justified as sole-source, route is Single-Tender / PAC with vendor-development flag."
    edit_risk: HIGH

  - rule_id: R2_capex_always_rfq
    priority: 2
    archetype: CAPEX
    condition: always
    recommend_channel: rfq_tendering
    rationale: "Non-recurring, project-specific; no benefit from framework agreements."
    edit_risk: HIGH

  - rule_id: R3_bulk_full_ltc
    priority: 3
    archetype: BULK
    condition: "total_spend_inr_cr >= bulk.full_ltc_threshold_total_spend_inr_cr AND po_count_6mo >= frequency_thresholds.high_freq_po_count_6mo_threshold"
    recommend_channel: rc_long_term_contract
    rationale: "Commodity raw material with continuous demand. Long-term volume contract with index-linked pricing captures hedging + supplier commitment."
    edit_risk: HIGH

  - rule_id: R4_bulk_smaller_annual
    priority: 4
    archetype: BULK
    condition: else_within_bulk
    recommend_channel: rc_outline_agreement
    rationale: "BULK below LTC threshold: annual OLA captures recurring demand without full multi-year commitment."
    edit_risk: HIGH

  - rule_id: R5_indirect_catalogue
    priority: 5
    archetype: INDIRECT
    condition: "avg_po_value <= indirect.low_value_avg_po_inr AND po_count_6mo > frequency_thresholds.high_freq_po_count_6mo_threshold"
    recommend_channel: rc_rop_catalogue
    rationale: "Standard stores consumable: high frequency + low ticket size + standardised spec → catalogue ideal."
    edit_risk: HIGH

  - rule_id: R6_indirect_ola
    priority: 6
    archetype: INDIRECT
    condition: "avg_po_value <= indirect.medium_value_avg_po_inr AND po_count_6mo >= 3"
    recommend_channel: rc_outline_agreement
    rationale: "Recurring INDIRECT MRO/spares: OLA captures volume with pre-agreed terms."
    edit_risk: HIGH

  - rule_id: R7_indirect_engineered
    priority: 7
    archetype: INDIRECT
    condition: "avg_po_value > indirect.medium_value_avg_po_inr"
    recommend_channel: asl
    rationale: "INDIRECT above ₹5L typically engineered / specialty — needs ASL panel of pre-qualified vendors."
    edit_risk: HIGH

  - rule_id: R8_service_recurring_ola
    priority: 8
    archetype: SERVICE
    condition: "po_count_6mo > frequency_thresholds.high_freq_po_count_6mo_threshold"
    recommend_channel: rc_outline_agreement
    rationale: "Recurring service (AMC / labour / housekeeping): OLA captures annual contract with call-offs."
    edit_risk: HIGH

  - rule_id: R9_service_project_rfq
    priority: 9
    archetype: SERVICE
    condition: "po_count_6mo <= frequency_thresholds.low_freq_po_count_6mo_threshold AND avg_po_value >= service.high_value_avg_po_inr"
    recommend_channel: rfq_tendering
    rationale: "Project-specific service: low frequency + high value → competitive RFQ."
    edit_risk: HIGH

  - rule_id: R10_direct_panel_asl
    priority: 10
    archetype: DIRECT
    condition: "vendor_count >= 3 AND avg_po_value < direct.high_value_avg_po_inr"
    recommend_channel: asl
    rationale: "DIRECT spec-sensitive item with 3+ vendor pool: ASL panel competes per RFQ event."
    edit_risk: HIGH

  - rule_id: R11_direct_high_value_asl_plus_rclt
    priority: 11
    archetype: DIRECT
    condition: "avg_po_value >= direct.high_value_avg_po_inr"
    recommend_channel: asl
    flag: "Top-vendor candidate for RC-LT — review with category manager"
    rationale: "DIRECT above ₹50L: ASL panel + flag top vendor for potential RC-LT relationship (mill rolls, large refractories, etc.)."
    edit_risk: HIGH

  - rule_id: R12_direct_narrow_vendor_base
    priority: 12
    archetype: DIRECT
    condition: "vendor_count <= 2 AND pac_pct < pac_high_threshold_pct"
    recommend_channel: asl
    flag: "SRM: narrow supplier base — develop alternates"
    rationale: "DIRECT with ≤2 vendors but not PAC-justified: ASL with vendor-development action plan."
    edit_risk: HIGH

  - rule_id: R13_unclassified_fallback
    priority: 13
    archetype: UNCLASSIFIED
    condition: always
    recommend_channel: rfq_tendering
    flag: "Unclassified MG — verify Material Group description with client (Material Master finding)"
    rationale: "Stage 9 could not classify. Route to RFQ pending manual review. Cross-pillar handoff to Material Master."
    edit_risk: HIGH

# =============================================================================
# SOLE-SOURCE RISK DETECTION (BC8) — three sub-signals combined
# =============================================================================

sole_source_risk_detection:

  bc8a_single_vendor:
    detection: "distinct_vendor_count = 1 for the MG over data window"
    confidence: HIGH
    edit_risk: LOW   # Definitional — single vendor means exactly one
    config:
      single_vendor_count_threshold: 1

  bc8b_concentrated:
    detection: "top_vendor_spend_share >= concentration_top_vendor_share_threshold_pct"
    confidence: HIGH
    config:
      concentration_top_vendor_share_threshold_pct:
        value: 80
        edit_risk: MEDIUM
        rationale: "Top vendor commands ≥80% of MG spend — concentration risk even if 2+ vendors exist."

  bc8c_pac_justified:
    detection_signals:   # Any of:
      - pac_flag_column_non_blank   # When column exists
      - pac_short_text_regex_match
      - qre_q_bc_12_confirmation
    pac_short_text_regex:
      value: "/proprietary|OEM|sole.?source|PAC|single.?source/i"
      edit_risk: MEDIUM
    pac_high_threshold_pct:
      value: 50
      edit_risk: MEDIUM
      rationale: "% of POs PAC-flagged above which the MG routes to Single-Tender per R1."
    pac_confidence_lift_via_qre:
      value: true   # If QRE Q-BC-12 confirms PAC reasoning, heuristic → HIGH confidence
      edit_risk: LOW

# =============================================================================
# CROSS-PLANT AGGREGATION DETECTION (BC7)
# =============================================================================

cross_plant_aggregation:
  cross_plant_min_plants_threshold:
    value: 2   # ≥2 plants buying the same MG
    edit_risk: MEDIUM
  vendor_overlap_pct_threshold:
    value: 50   # Below this → fragmented vendor base across plants → aggregation opportunity
    edit_risk: MEDIUM
    rationale: "If <50% of plants buying the same MG use overlapping vendors, vendor consolidation precondition for any contracted channel migration."
  cross_pillar_handoff:
    pillar: op-model
    theme: centralisation
    rationale: "Cross-plant aggregation findings feed Op Model centralisation analysis from the channel angle."

# =============================================================================
# MIGRATION + QUANTIFICATION (BC6, BC11, BC12, BC13)
# =============================================================================

migration_config:
  migration_priority_high_spend_share_pct:
    value: 1.0   # MGs with spend share >1% of portfolio AND misrouted → HIGH priority
    edit_risk: LOW
  transformation_ceiling_lift_pp:
    value: 25
    edit_risk: HIGH
    rationale: "Max % point lift in contracted % per single transformation programme — realistic ramp-up constraint. Theme 3 caps BC13 contract coverage projection at as-is + 25 pp."

tat_benchmarks:
  # Default TAT per channel (days) — used in BC11 weighted TAT calculation.
  # Industry overlays can override.
  rc_lt_days:
    value: 3
    edit_risk: HIGH
  ola_days:
    value: 3
    edit_risk: HIGH
  catalogue_days:
    value: 1
    edit_risk: HIGH
  asl_days:
    value: 25
    edit_risk: HIGH
  rfq_days:
    value: 70   # midpoint of 45-90 day band
    edit_risk: HIGH

