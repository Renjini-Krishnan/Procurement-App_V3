    bic_high: 50
    edit_risk: HIGH
  ola_share_total_pct:
    typical_low: 10
    typical_high: 20
    bic_low: 25
    bic_high: 35
    edit_risk: HIGH
  rc_lt_share_bulk_pct:
    typical_low: 60
    typical_high: 80
