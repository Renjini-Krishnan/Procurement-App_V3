  categories_master_schema_requirement:
    requires_field: "archetype: BULK | DIRECT | INDIRECT | SERVICE | CAPEX"
    coordination_note: "Stage 9 must add 'archetype' field per category in categories-master.yml. Cross-chat dependency."
    edit_risk: HIGH

