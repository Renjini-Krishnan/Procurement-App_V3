# =============================================================================
# CHANNEL RECOMMENDATION RULES — per archetype
# =============================================================================
# Engine evaluates these as if-then rules in order. First match wins per MG.

recommendation_rules:

  - archetype: CAPEX
    condition: always
    recommend_channel: rfq_tendering
    rationale: "Non-recurring, project-specific; no benefit from framework agreements"

  - archetype: SERVICE
    condition: "mg_desc_contains_any: [AMC, ANNUAL MAINTENANCE, CONTRACT LABOUR, HOUSEKEEPING, ANNUAL, 'A.M.C']"
    recommend_channel: rc_outline_agreement
    rationale: "Recurring service; OLA enables call-offs without fresh negotiation"

  - archetype: SERVICE
    condition: else
    recommend_channel: rfq_tendering
    rationale: "Project-specific service; competitive bidding appropriate"

  - archetype: BULK
    condition: always
    recommend_channel: rc_long_term_contract
    rationale: "Commodity raw material; long-term volume contract with index-linked pricing"

  - archetype: DIRECT
    condition: "pac_pct > 50"
    recommend_channel: single_tender_pac
    flag: "PAC — assess vendor development; build alternate source"

  - archetype: DIRECT
    condition: else
    recommend_channel: asl
    rationale: "Spec-sensitive; pre-qualified vendor panel competes per RFQ event"

  - archetype: INDIRECT
    condition: "pac_pct > 50"
    recommend_channel: single_tender_pac
    flag: "PAC — assess vendor development; build alternate source"

  - archetype: INDIRECT
    condition: "mg_desc_contains_any: [PPE, GREASE, LUBR, OIL, TONER, STATIONERY, PACKAGING, WELDING, CONSUMABLE]"
    recommend_channel: rc_rop_catalogue
    rationale: "Standardised stores consumable; catalogue / ROP enables zero-touch ordering"

  - archetype: INDIRECT
    condition: "vendor_count == 1"
    recommend_channel: rc_outline_agreement
    flag: "SRM: single vendor — develop alternatives"

  - archetype: INDIRECT
    condition: else
    recommend_channel: rc_outline_agreement
    rationale: "Recurring indirect; OLA captures volume + pre-agreed terms"

  - archetype: UNCLASSIFIED
    condition: always
    recommend_channel: rfq_tendering
    flag: "Unclassified — verify material group description and route"

# =============================================================================
# CROSS-THEME SYNTHESIS CONFIG
# =============================================================================
synthesis:
  file: "buying-channel/cross-theme-synthesis.md"
  runs_after: [current-state, archetype-recommendation, gap-impact]
  no_savings_quantification: true   # this pillar produces no ₹ — TAT/process only
  cross_pillar_handoffs:
    - to_pillar: op-model
      via_finding: "Single-vendor INDIRECT flags align with Tail Spend vendor footprint"
    - to_pillar: supplier
      via_finding: "Single-vendor + high-PAC categories feed Supplier concentration analysis"
    - to_pillar: material-master
      via_finding: "UNCLASSIFIED MG count → MG description quality issue"

# =============================================================================
# GLOBAL CONFIG
# =============================================================================
global:
  data_quality_gates:
    minimum_po_completeness_pct: 80
    minimum_contract_field_population_pct: 50   # below this, current-state confidence drops
  frequency_classification:
    distinct_months_threshold_indirect: 3   # ≥ 3 months → INDIRECT
  transformation_ceiling:
    to_be_rc_pct_max_lift_pp: 25   # to-be RC % capped at as-is + 25pp (realistic ramp-up)
  pac_thresholds:
    high_pac_pct: 50   # PAC% above this triggers Single Tender recommendation
    flag_pac_pct: 30   # PAC% above this flagged for review
  confidence_aggregation:
    pillar_level: "min_of_themes"

# =============================================================================
# PILLAR MATURITY SCORE
# =============================================================================
pillar_score:
  formula: |
    buying_channel_score = 0.20 × current_state_score
                        + 0.50 × archetype_recommendation_score
                        + 0.30 × gap_impact_score
  descriptors_file: "buying-channel/scoring-descriptors.yml"
  rounding: 1
  display_format: "<score>/5"

# =============================================================================
# Editable Configuration
# =============================================================================
# themes.<theme>.pillar_weight: MEDIUM risk; must sum to 1.00
# archetype_keyword_banks.*: MEDIUM risk; industry overlay can append (LOW)
# recommendation_rules.*: HIGH risk (partner) — changes channel guidance per archetype
# global.transformation_ceiling.to_be_rc_pct_max_lift_pp: MEDIUM (default 25)
# global.pac_thresholds.high_pac_pct: MEDIUM (default 50)
# Component IDs / structure: HIGH (partner)
# =============================================================================
