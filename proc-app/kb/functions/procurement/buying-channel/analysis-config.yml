# =============================================================================
# GLOBAL CONFIG
# =============================================================================

global:
  data_quality_gates:
    minimum_po_completeness_pct:
      value: 80
      edit_risk: MEDIUM
    minimum_contract_field_population_pct:
      value: 50
      edit_risk: MEDIUM
      rationale: "Below this, current-state contracted % is a lower bound — flag in narrative."

  dual_view_categories_required:
    value: true
    edit_risk: LOW
    rationale: "Every MG output row carries both original (client raw) and reclassified (canonical) category fields. Non-negotiable for client-facing reports."

  framework_transparency:
    show_framework_before_results:
      value: true
      edit_risk: LOW
      rationale: "App renders framework-overview.md content BEFORE client-specific results. Consultants and clients see the engine logic first."
    overview_file: "buying-channel/framework-overview.md"

  confidence_aggregation:
    theme_level: "min_of_components"

# =============================================================================
# CROSS-PILLAR HANDOFFS
# =============================================================================

cross_pillar_handoffs:
  - source_component: bc7_cross_plant_aggregation_opportunity
    target_pillar: op-model
    target_theme: centralisation
    handoff_content: "Cross-plant aggregation opportunity from channel angle complements Op Model centralisation finding."

  - source_component: bc8_sole_source_risk_categories
    target_pillar: supplier
    handoff_content: "Single-vendor + concentrated MGs feed Supplier vendor-concentration analysis + SRM recommendation."

  - source_component: bc10_unclassified_mgs
    target_pillar: material-master
    handoff_content: "MGs Stage 9 could not classify → Material Master MG description quality finding."

# =============================================================================
# THEME SCORING (single theme — no pillar rollup)
# =============================================================================

theme_scoring:
  buying-channel-strategy:
    scoring_descriptors_file: "buying-channel/scoring-descriptors.yml"
    score_drivers:
      - contracted_spend_pct
      - catalogue_penetration_pct_indirect
      - match_status_distribution   # ✅ Already Right vs ❌ Misrouted
      - sole_source_risk_pct
      - portfolio_tat_days
