# Per-benchmark approval matrix:
#   - Value range change: HIGH
#   - Primary source change: HIGH
#   - Add/remove supporting source: MEDIUM
#   - Edit drivers_explained text: LOW
#   - Add new benchmark id: HIGH
#   - Mark benchmark deprecated: HIGH
# Touch-time benchmarks (buying_channel.touch_time.*) are MEDIUM — they vary
# materially by client maturity and are easier to recalibrate per engagement.
