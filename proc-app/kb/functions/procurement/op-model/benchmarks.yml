# ============================================================================
# TAIL SPEND THEME
# ============================================================================

  - id: opmodel.tail_spend.outsourcing_savings_rate
name: "Tail Spend Outsourcing Savings Rate (Combined)"
description: |
  Single rolled-up % applied to aggregator-addressable tail spend. Combined drivers:
  price savings via aggregator volume aggregation (~30-50%), cost-to-serve reduction (~40-50%),
  supplier management overhead reduction (~10-20%).
metric_type: percentage_range
unit: "%"
primary:
  source_id: ACN-Proc-Benchmark-DB
  source_reference: "Accenture engagements with Indian managed-procurement aggregators (Moglix, Bizongo, Industrybuying, Power2SME, OfBusiness) 2020-2024"
  value_range: [3, 8]
  confidence: high
  year: 2024
  sample_size: "~25 Indian large-enterprise engagements with aggregator outsourcing scope"
supporting:
  - source_id: Hackett-2024
    value_range: [4, 7]
    confidence: medium
  - source_id: APQC-2024
    value_range: [3, 6]
    confidence: medium
composite:
  value_range: [3, 8]
applies_to_pillars: [op-model]
layer: function
edit_risk: high

# ============================================================================
# CoE THEME
# ============================================================================

  - id: opmodel.coe.savings_rate
name: "Centre of Excellence Value-Add Savings Rate (Combined)"
description: |
  Single rolled-up % applied to CoE-addressable strategic spend (when categories
  tagged "CoE-Suitable" AND not already in CoE).
  IMPORTANT: CoE value-add is INCREMENTAL over baseline centralisation.
  For categories in BOTH cent gap + CoE gap, savings NOT additive on volume aggregation —
  only on strategic depth. Engine flags overlap categories.
metric_type: percentage_range
unit: "%"
primary:
  source_id: ACN-Proc-Benchmark-DB
  source_reference: "Accenture CoE implementation engagements 2018-2024"
  value_range: [2, 5]
  confidence: high
  year: 2024
  sample_size: "~50 cross-industry CoE engagement learnings"
supporting:
  - source_id: Hackett-2024
    value_range: [3, 6]
    confidence: medium
  - source_id: APQC-2024
    value_range: [2, 4]
    confidence: high
composite:
  value_range: [2, 6]
drivers_explained: |
  Negotiation leverage from deep category expertise (~30-40%),
  Spec standardisation + value engineering (~25-35%),
  Supplier consolidation + relationship management (~20-30%),
  Market intelligence + timing (~10-15%).
applies_to_pillars: [op-model]
layer: function
edit_risk: high
