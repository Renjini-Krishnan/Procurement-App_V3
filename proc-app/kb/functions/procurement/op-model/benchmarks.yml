# ============================================================================
# CENTRALISATION THEME
# ============================================================================

benchmarks:

  - id: opmodel.centralisation.savings_rate
name: "Centralisation Savings Rate (Combined)"
description: |
  Single rolled-up percentage applied to candidate spend when category tagged
  "Suggest Centralise". Combined effect of volume aggregation + spec standardisation +
  negotiation leverage + process efficiency.
metric_type: percentage_range
unit: "%"
primary:
  source_id: APQC-2024
  source_reference: "Open Standards Benchmarking — Procurement Transformation, p47"
  value_range: [2, 4]
  confidence: high
  year: 2024
  sample_size: "500+ procurement organisations across industries"
  methodology: "Self-reported with ERP validation; cross-industry sample"
supporting:
  - source_id: Hackett-2024
    value_range: [3, 5]
    year: 2024
    note: "World-class subset (top-quartile organisations)"
    confidence: high
  - source_id: ACN-Proc-Benchmark-DB
    value_range: [2, 4]
    year: 2024
    confidence: high
composite:
  value_range: [2, 5]
drivers_explained: |
  Drivers (illustrative weighting): Volume aggregation ~50%, Spec standardisation ~25%,
  Negotiation ~15%, Process efficiency ~10%. Applied as single rolled-up number.
applies_to_pillars: [op-model]
applies_to_industries: []
layer: function
edit_risk: high

  - id: opmodel.centralisation.centre_led_savings_rate
name: "Centre-Led Savings Rate (Combined)"
description: |
  Single rolled-up % applied when category tagged "Suggest Centre-Led"
  (central contracting + local execution). Typically ~50% of full centralisation rate.
metric_type: percentage_range
unit: "%"
primary:
  source_id: ACN-Proc-Benchmark-DB
  value_range: [1, 2]
  confidence: medium
  year: 2024
supporting:
  - source_id: Hackett-2024
    value_range: [1, 3]
    note: "Hackett positions Centre-Led as ~50-60% of full centralisation savings"
    confidence: medium
  - source_id: APQC-2024
    value_range: [1, 2]
    confidence: high
drivers_explained: |
  Centre-Led savings lower than full centralisation: volume agg partial, spec std partial,
  negotiation captured, process gain smaller.
applies_to_pillars: [op-model]
layer: function
edit_risk: high

