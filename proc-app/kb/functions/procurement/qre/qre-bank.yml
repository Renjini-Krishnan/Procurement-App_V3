context_qres:

  - id: Q-CL-XX
    question: "Industry sub-segment (for Steel: integrated mill / mini-mill / specialty / conglomerate / foreign-owned)"
    consumed_from: client_segment_context
    compulsory: true_for_op3
    notes: "Industry sub-segment identifier (e.g., Steel: integrated mill / mini-mill / specialty / conglomerate / foreign-owned). Sourced from client onboarding, not pillar QRE collection."
    used_by: [orgstructure.organisation_posture.op3_industry_typical_patterns]
