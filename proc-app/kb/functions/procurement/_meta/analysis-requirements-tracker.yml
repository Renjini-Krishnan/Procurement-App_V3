    purpose: "Project as-is → to-be contracted % lift after migration, capped at +25pp transformation ceiling. Compares to benchmark band."
    feasibility: reliable_with_assumptions

    data_required:
      - file: PO
        fields: [contracted_pct_current, migration_spend_to_contracted_channels]
        criticality: critical (computed from BC2 + BC6)

    data_cleaning_dependencies: []

    category_classification_required: true   # inherits BC4

    qre_questions_used: []

    industry_overlay_required:
      - "buying-channel/benchmarks.yml — industry-specific contracted % benchmark bands"

    benchmarks_consumed:
      - id: buying_channel.portfolio.contracted_spend_pct
      - id: buying_channel.transformation.ceiling_contracted_lift_pp

    confidence_drivers:
      high: "Migration list grounded in BC6 high-confidence recommendations"
      medium: "Some BC6 migrations MEDIUM confidence (apply weighted)"
      low: "BC6 LOW — projection should be flagged as directional"

    coverage: Build 1



    # =============================================================================
    # AGGREGATE VIEWS — auto-derivable from per-analysis entries
    # =============================================================================
    # These are summary views that downstream build artefacts consume.
    # Updated whenever per-analysis entries change.
    # =============================================================================

aggregate_data_requirements:
  PO:
    critical_fields:
      - po_id
      - po_value
      - po_date
      - plant
      - vendor_id
      - vendor_name
      - category (post-Stage-9)
    nice_to_have_fields:
      - EKORG / purchasing_org / buyer_id / cost_center  # for C0 baseline only
      - contract_ref
      - RC_ref
    notes: "These are required for centralisation analyses (C1-C4) + optional baseline (C0). More fields added as other Op Model themes are authored."

  Vendor_Master:
    critical_fields:
      - vendor_id
      - vendor_name
      - active_flag
    nice_to_have_fields:
      - vendor_type (captive / open / approved)
      - category_served
      - geography
    notes: "Centralisation analysis uses vendor_id + name for C2 vendor pattern insight. Vendor_type useful for distinguishing captive in C3 industry filter."

  Org_Structure:
    critical_fields: []  # not directly used by centralisation analysis
    nice_to_have_fields:
      - employee_id
      - reports_to
      - role
    notes: "Used indirectly for C0 baseline (if buyer_id approach is taken). Heavily used by Org Structure pillar."

