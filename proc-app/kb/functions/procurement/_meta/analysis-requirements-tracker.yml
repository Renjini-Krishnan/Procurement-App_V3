  - id: orgstructure.fte_sizing.ft0_current_state
    pillar: org-structure
    theme: fte-sizing-role-composition
    purpose: "Capture FTE counts by role / level / entity from Org Structure (hierarchy) OR Employee Master (list) + QRE. Run intelligent role classification pipeline."

    feasibility: reliable
    skip_if_data_missing: |
      Skip ALL of Theme 2 if both:
      - QRE Q-OS-FT-01 (total FTE) unanswered
      - No Org Structure / Employee Master uploaded
      Otherwise FT0 runs with whatever data is available.

    data_required:
      - file: Org_Structure_OR_Employee_Master
        accept_formats:
          - "Format A: Org Structure (hierarchy view — PowerPoint/PDF/structured Excel with reports_to)"
          - "Format B: Employee Master (list view — Excel/CSV with one row per employee)"
        fields_after_stage_6_validation:
          - employee_id (synthetic if not provided) [always available after Stage 6]
          - name [usually]
          - role_title / job_title (raw, generic — needs classification) [always]
          - classified_role_type (derived: Cat Mgr / Transactional / Specialist / Leadership) [derived]
          - classified_specialist_subtype (Analytics / SRM / FBP / etc.) [derived if applicable]
          - classified_confidence (high / medium / low) [derived]
          - level / band / grade [usually]
          - reports_to [sometimes — often missing in Format A]
          - entity (central / plant_X / BU_X) [usually]
          - function [usually]
          - focus_area / category_owned [rarely]
          - active_flag [usually defaults]
        criticality: critical_for_FT2_FT3_FT4
        notes: |
          Generic client titles like "Manager - Procurement" require intelligent
          mapping. NO assumption that clients pre-classify roles as Cat Mgr /
          Transactional / Specialist. Role classification is a 3-step pipeline
          (rule-based + level-entity tie-breaker + AI prompt) followed by Stage 6
          consultant validation. See fte-sizing-role-composition.md Section 2.5.

    data_cleaning_dependencies:
      - rule: procurement.org_role_title_canonicalised
        notes: |
          Stage 6 runs the 3-step intelligent classification pipeline + consultant
          validation. Output: each FTE tagged with classified_role_type + confidence.
      - rule: procurement.entity_classification_via_stage6_mapping
        notes: "Same Stage 6 entity mapping as Op Model centralisation"
      - rule: data_quality_universal.remove_fully_blank_rows

    category_classification_required: false

    qre_questions_used:
      - id: Q-OS-FT-01
        question: "Approximately how many FTEs are in the procurement function?"
        answer_type: count_band
        options: ["<20", "20-50", "50-100", "100-200", "200+", "Don't know"]
        compulsory: true
      - id: Q-OS-FT-02
        question: "Approximate split — Category Manager / Transactional / Specialist / Leadership?"
        answer_type: percentage_breakdown
        compulsory: false
      - id: Q-OS-FT-03
        question: "Which specialist roles are present in your procurement function?"
        answer_type: multi_select
        options: [Analytics, Contract_Mgmt, SRM, FBP, Risk, Sustainability_ESG, Digital, Commodity_Analyst, Logistics_Specialist, Other]
        compulsory: false
      - id: Q-OS-FT-04
        question: "Where are your FTEs located (Central / Plant / BU)?"
        answer_type: free_text_with_counts
        compulsory: false
      - id: Q-OS-FT-05
        question: "How do you describe your team sizing today?"
        answer_type: enum_with_rationale
        options: [Adequate, Stretched, Over-staffed, Mixed]
        compulsory: false

    industry_overlay_required: []

    benchmarks_consumed: []

    confidence_drivers:
      high: "Org Structure excel complete + Stage 6 role-title mapping done + all QRE answered"
      medium: "Some role-title ambiguity OR QRE partial"
      low: "Org excel partial OR role titles inconsistent"

    coverage: Build 1

  - id: orgstructure.fte_sizing.ft1_spend_per_fte
    pillar: org-structure
    theme: fte-sizing-role-composition
    purpose: "Compute spend/FTE; compare to industry benchmark; produce sizing verdict + FTE delta range (NOT ₹)."

    feasibility: reliable
