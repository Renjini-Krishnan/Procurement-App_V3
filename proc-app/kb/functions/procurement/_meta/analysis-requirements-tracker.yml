      Skip FT1 only if BOTH total FTE count missing (Q-OS-FT-01 unanswered AND
      no Org excel) AND total spend missing (PO data unavailable).
      FT1 does NOT depend on role classification — uses headcount + total spend only.

    data_required:
      - file: Org_Structure_OR_Employee_Master_OR_QRE_Q-OS-FT-01
        fields: [total_active_procurement_FTE_count]
        criticality: critical
      - file: PO
        fields: [po_value]
        criticality: critical

    data_cleaning_dependencies:
      - rule: procurement.po_value_currency_normalised
      - rule: data_quality_universal.normalise_numeric_format

    category_classification_required: false   # uses total spend, not category-level

    qre_questions_used: []

    industry_overlay_required:
      - "Steel overlay spend/FTE band: org.fte_productivity.spend_per_fte_inr_cr [40, 80] Cr/FTE"

    benchmarks_consumed:
      - id: org.fte_productivity.spend_per_fte_inr_cr
        from_file: proc-app/kb/functions/procurement/org-structure/benchmarks.yml
        with_industry_overlay: industries/<ind>/by-function/procurement/org-structure/benchmarks.yml

    explicit_boundary: |
      Output is FTE delta in # FTEs only. NO ₹ cost-out savings produced.
      Translating FTE delta to ₹ touches HR / transition territory and is
      intentionally out of scope.

    confidence_drivers:
      high: "Org excel + PO data complete + industry overlay loaded"
      medium: "One data source partial"
      low: "Either FTE or spend data significantly gappy"

