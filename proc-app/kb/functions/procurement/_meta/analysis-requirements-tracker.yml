# =============================================================================
# Analysis Requirements Tracker
# =============================================================================
# Purpose: Aggregates the data, cleaning, QRE, and industry-overlay requirements
#      across every analysis as we author them. Master input for downstream
#      build artefacts (data templates, cleaning rules, QRE bank, industry
#      overlay design).
#
# Logic Embodied: As each analysis is authored in any pillar's theme files, an
#             entry is added here capturing what data + cleaning + QRE +
#             overlay it needs. Aggregate views auto-derivable from entries
#             feed downstream build artefacts.
#
# Inputs Used: Per-analysis design decisions captured during KB authoring.
# Outputs Produced: Aggregated requirements consumed by:
#               - data-templates/ (which fields required across all analyses)
#               - data-cleaning/ (which cleaning rules are critical)
#               - qre/qre-bank.yml (which questions to include)
#               - industries/<ind>/.../ (where industry overlays need to provide specifics)
# How Used by App: Not consumed at runtime; build-time artefact for KB authors
#              and tech team.
# Cross-References:
#   - All <pillar>/<theme>.md files contribute entries
#   - data-templates/catalog.yml synthesises from aggregate_data_requirements
#   - qre/qre-bank.yml synthesises from aggregate_qre_questions
# =============================================================================

metadata:
  id: analysis-requirements-tracker
  layer: function
  function: procurement
  version: 1.0
  last_updated: 2026-05-27
  owner: kb-admin
  status: active
  authoring_pattern: "Append entries as new analyses are designed; refactor aggregate views periodically."

# =============================================================================
# PER-ANALYSIS ENTRIES
# =============================================================================
# Schema per entry:
#   id                Unique analysis ID (e.g., opmodel.centralisation.c1_multi_plant_detection)
#   pillar            Op Model / Org Structure / Buying Channel / etc.
#   theme             Centralisation / Shared Services / CoE / etc.
#   purpose           One-line statement of what this analysis answers
#   data_required     Data files + fields required
#   data_cleaning_dependencies   Cleaning rules this analysis depends on
#   category_classification_required   Boolean — needs Stage 9 classification
#   qre_questions_usedQRE question IDs consumed
#   industry_overlay_required   Industry-specific data this analysis needs from overlay
#   benchmarks_consumed   Benchmark IDs this analysis uses
#   confidence_driversWhat makes the analysis high vs low confidence
#   coverage          Build 1 / Build 2
# =============================================================================

analyses:

      # ============================================================================
      # OP MODEL — CENTRALISATION THEME
      # ============================================================================

  - id: opmodel.centralisation.c0_baseline
    pillar: op-model
    theme: centralisation
    purpose: "Compute current spend_central_pct if PO data has classifying field; else use QRE estimate."

    data_required:
      - file: PO
        fields:
          - po_id (key)
          - po_value (numeric, ≥0)
          - One of: EKORG OR purchasing_org OR buyer_id OR cost_center  # any classifying field
        criticality: nice_to_have   # analysis runs with QRE alternative

    data_cleaning_dependencies:
      - rule: procurement.entity_classification_via_stage6_mapping
        notes: "Consultant maps EKORG / Buyer / CC values to central/plant/BU at Stage 6 User Validation."
      - rule: data_quality_universal.normalise_numeric_format

    category_classification_required: false   # baseline doesn't need category-level classification

    qre_questions_used:
      - id: Q-OM-01
        question: "Approximately what % of your annual procurement spend is processed by a central procurement team?"
        answer_type: range_band
        options: ["<20%", "20-40%", "40-60%", "60-80%", ">80%"]
        compulsory: false
        notes: "Used to set baseline when PO data lacks classifying field. Compared against PO-computed if available."
      - id: Q-OM-02
        question: "Of your top-10 procurement categories by spend, approximately how many are managed centrally end-to-end?"
        answer_type: count_band
        options: ["0-2", "3-5", "6-8", "9-10"]
        compulsory: false

    industry_overlay_required: []

    benchmarks_consumed: []   # baseline is engagement-specific, not benchmark-driven

    confidence_drivers:
      high: "PO classifying field present + Stage 6 mapping done + low deviation between PO and QRE"
      medium: "Only one data source (PO OR QRE) available"
      low: "PO classifying field absent AND/OR Stage 6 mapping incomplete"

    fallback_logic: |
      IF PO has classifying field AND Stage 6 mapped → use PO-computed primary
      ELSE → use QRE only (mark as "client estimate")
      IF both → quant primary, QRE secondary, flag deviation > 10pp

    coverage: Build 1

  - id: opmodel.centralisation.c1_multi_plant_detection
    pillar: op-model
    theme: centralisation
    purpose: "Identify reclassified categories bought by ≥ 2 plants with material spend."

    data_required:
      - file: PO
        fields:
          - po_id
          - po_value (numeric, ≥0)
          - plant (categorical; canonical list per Stage 6 mapping)
          - category (POST-STAGE-9 reclassified, NOT raw client label)
        criticality: critical   # analysis cannot run without

    data_cleaning_dependencies:
      - rule: procurement.plant_code_mapped_to_canonical
        notes: "Stage 6 User Validation maps client's plant codes to canonical plant list"
      - rule: data_quality_universal.normalise_numeric_format
      - rule: data_quality_universal.remove_fully_blank_rows

    category_classification_required: true   # depends on Stage 9 output

    qre_questions_used: []

    industry_overlay_required:
      - "material_threshold_inr_cr (industry-specific spend threshold)"

    benchmarks_consumed: []

    confidence_drivers:
      high: "Stage 9 classification ≥ 90% of spend AND plant codes fully mapped"
      medium: "Stage 9 80-90% OR some plant codes ambiguous"
      low: "Stage 9 < 80% OR significant plant code gaps"

    coverage: Build 1

  - id: opmodel.centralisation.c2_vendor_pattern_insight
    pillar: op-model
    theme: centralisation
    purpose: "Describe current vendor concentration for multi-plant candidates (descriptive only — not decision-driving)."

    data_required:
      - file: PO
        fields:
          - vendor_id (key)
          - vendor_name (text)
          - category (post-Stage-9)
          - plant
          - po_value
        criticality: critical for the insight; analysis can skip if missing

    data_cleaning_dependencies:
      - rule: procurement.vendor_dedup_semantic
        notes: "Vendor name standardisation (e.g., 'ABC Industries' vs 'ABC INDUSTRIES PVT LTD') for accurate count"

    category_classification_required: true

    qre_questions_used: []

    industry_overlay_required: []

    benchmarks_consumed: []

    confidence_drivers:
      high: "Vendor master fully deduped + Stage 9 classification ≥ 90%"
      medium: "Vendor master partially deduped"
      low: "Vendor master not deduped → unique_vendors count overstated"

    coverage: Build 1

  - id: opmodel.centralisation.c3_industry_knowledge_filter
    pillar: op-model
    theme: centralisation
    purpose: "Tag multi-plant candidates as Centralise / Centre-Led / Industry-Local using industry overlay."

    data_required:
      - file: PO
        fields:
          - category (post-Stage-9; must match standard taxonomy in industry's categories-master.yml)
        criticality: critical

    data_cleaning_dependencies:
      - rule: procurement.category_aligned_to_industry_taxonomy
        notes: "Stage 9 reclassification must align to industry's categories-master.yml IDs"

    category_classification_required: true

    qre_questions_used:
      - id: Q-OM-EXC
        question: "Are there any procurement categories your team feels MUST stay local for reasons not captured in your data?"
        answer_type: free_text
        compulsory: false
        notes: "Safety-net for edge cases industry overlay missed."

    industry_overlay_required:
      - "centralisation-filters.yml — naturally_local list"
      - "centralisation-filters.yml — naturally_central list"
      - "centralisation-filters.yml — centre_led list"
      - "centralisation-filters.yml — material_threshold_inr_cr"

    benchmarks_consumed: []

    confidence_drivers:
      high: "Industry overlay loaded + categories well-matched + Q-OM-EXC reviewed"
      medium: "Some categories unlisted (default to Suggest Centralise)"
      low: "Industry overlay missing → analysis falls back to function default (no industry filter)"

    coverage: Build 1

  - id: opmodel.centralisation.c4_savings_quantification
    pillar: op-model
    theme: centralisation
    purpose: "Compute ₹ Cr savings range for Suggest Centralise + Suggest Centre-Led candidates."

    data_required:
      - file: PO
        fields:
          - po_value (numeric)
          - category (post-Stage-9)
        criticality: critical

    data_cleaning_dependencies:
      - rule: procurement.po_value_currency_normalised
        notes: "All PO values normalised to a single currency (typically INR) for consistent computation"

    category_classification_required: true

    qre_questions_used: []

    industry_overlay_required:
      - "Steel overlay savings rate: opmodel.centralisation.savings_rate [4, 7]%"
      - "Cement overlay savings rate: opmodel.centralisation.savings_rate [3, 5]%"
      - "Function default fallback: opmodel.centralisation.savings_rate [2, 4]%"

    benchmarks_consumed:
      - id: opmodel.centralisation.savings_rate
        from_file: proc-app/kb/functions/procurement/op-model/benchmarks.yml
        with_industry_overlay: industries/<ind>/by-function/procurement/op-model/benchmarks.yml
      - id: opmodel.centralisation.centre_led_savings_rate
        from_file: proc-app/kb/functions/procurement/op-model/benchmarks.yml
        with_industry_overlay: industries/<ind>/by-function/procurement/op-model/benchmarks.yml

    confidence_drivers:
      high: "Industry overlay rate available + Stage 9 classification ≥ 90%"
      medium: "Function default rate applied (no industry overlay)"
      low: "Stage 9 < 80% + no industry overlay"

    coverage: Build 1

      # ============================================================================
      # OP MODEL — SHARED SERVICES THEME
      # ============================================================================

  - id: opmodel.shared_services.ss0_current_coverage
    pillar: op-model
    theme: shared-services
    purpose: "Capture current SSC scope (qualitative baseline)."

    data_required: []  # QRE-only

    data_cleaning_dependencies: []

    category_classification_required: false

    qre_questions_used:
      - id: Q-OM-SS-01
        question: "Does your organisation have a procurement Shared Service Centre (SSC)?"
        answer_type: enum
        options: [Yes, No, Partial]
        compulsory: true
      - id: Q-OM-SS-02
        question: "What categories does your SSC handle today?"
        answer_type: free_text_plus_checklist
        compulsory: conditional  # if Q-OM-SS-01 ≠ No
      - id: Q-OM-SS-03
        question: "How many FTEs are in your procurement SSC?"
        answer_type: count_band
        options: ["0", "1-5", "6-15", "16-30", "30+"]
        compulsory: conditional
      - id: Q-OM-SS-04
        question: "Typical processing cost per PO in your SSC (if known)?"
        answer_type: range_band_inr
        options: ["<₹1,000", "₹1,000-2,000", "₹2,000-3,500", "₹3,500-5,000", ">₹5,000", "Don't know"]
        compulsory: false
      - id: Q-OM-SS-05
        question: "Beyond category-level scope, are there specific procurement ACTIVITIES (e.g., PO creation, GRN follow-up, invoice verification, vendor onboarding, payment follow-up, contract administration) that your team feels SHOULD move to an SSC — or specifically should NOT?"
        answer_type: free_text
        compulsory: false
        notes: "Activity-level qualitative input only; feeds narrative recommendation. No quantified analysis — activity audit is intentionally out of scope for Op Model pillar."

    industry_overlay_required: []

    benchmarks_consumed: []

    confidence_drivers:
      high: "All 5 QRE questions answered"
      medium: "SSC exists but partial info"
      low: "Client doesn't know SSC scope precisely"

    coverage: Build 1

  - id: opmodel.shared_services.ss1_volume_value_quadrant
    pillar: op-model
    theme: shared-services
    purpose: "Classify reclassified categories into 4 quadrants (Strategic/Hybrid/Transactional/Tail) based on PO count and avg PO value."

    data_required:
      - file: PO
        fields:
          - po_id (key)
          - po_value (numeric)
          - category (post-Stage-9)
        criticality: critical

    data_cleaning_dependencies:
      - rule: data_quality_universal.normalise_numeric_format
      - rule: procurement.po_value_currency_normalised

    category_classification_required: true

    qre_questions_used: []

    industry_overlay_required: []

    benchmarks_consumed: []

    confidence_drivers:
      high: "Stage 9 ≥ 90% classification + PO data complete"
      medium: "Stage 9 80-90% + some classification gaps"
      low: "Stage 9 < 80% — quadrant assignments may be skewed"

    coverage: Build 1

    notes: |
      SS1 quadrant output ALSO feeds:
      - CoE theme (Q4 strategic categories)
      - Tail Spend theme (Q3 tail categories)
      It's the shared analysis underpinning multiple Op Model themes.

  - id: opmodel.shared_services.ss2_industry_filter
    pillar: op-model
    theme: shared-services
    purpose: "Tag Q1 transactional candidates as SSC-Suitable / SSC-Unsuitable / Centre-Handled using industry overlay."

    data_required:
      - file: PO
        fields: [category (post-Stage-9)]
        criticality: critical

    data_cleaning_dependencies:
      - rule: procurement.category_aligned_to_industry_taxonomy

    category_classification_required: true

    qre_questions_used:
      - id: Q-OM-SS-EXC
        question: "Are there any transactional categories your team feels MUST stay with plant buyers (not SSC) for reasons not in your data?"
        answer_type: free_text
        compulsory: false

    industry_overlay_required:
      - "shared-services-filters.yml — ssc_suitable list"
      - "shared-services-filters.yml — ssc_unsuitable list"
      - "shared-services-filters.yml — centre_handled list"
      - "shared-services-filters.yml — ssc_minimum_po_count + ssc_minimum_annual_spend_inr_cr thresholds"

    benchmarks_consumed: []

    coverage: Build 1

  - id: opmodel.shared_services.ss3_coverage_gap
    pillar: op-model
    theme: shared-services
    purpose: "Compute the gap between data-suggested SSC scope and current SSC scope."

    data_required:
      - file: PO
        fields: [category, po_value, po_id]
        criticality: critical

    data_cleaning_dependencies: []

    category_classification_required: true

    qre_questions_used:
      - id: Q-OM-SS-02  # used for current SSC scope
        consumed_from: opmodel.shared_services.ss0_current_coverage

    industry_overlay_required: []

    benchmarks_consumed: []

    coverage: Build 1

  - id: opmodel.shared_services.ss4_fte_productivity
    pillar: op-model
    theme: shared-services
    purpose: "Quantify cost-per-PO savings and FTE redeployment from expanding SSC scope."

    data_required:
      - file: PO
        fields: [po_id, po_value, category]
        criticality: critical

    data_cleaning_dependencies:
      - rule: procurement.po_value_currency_normalised

    category_classification_required: true

    qre_questions_used:
      - id: Q-OM-SS-04
        consumed_from: opmodel.shared_services.ss0_current_coverage
        usage: "If client provided actual current cost-per-PO, prefer over function default"

    industry_overlay_required:
      - "Steel overlay current_cost_per_po + ssc_target_cost_per_po + productivity_gain_pct + pos_per_fte_annual"

    benchmarks_consumed:
      - id: opmodel.shared_services.current_cost_per_po_inr
      - id: opmodel.shared_services.ssc_target_cost_per_po_inr
      - id: opmodel.shared_services.ssc_productivity_gain_pct
      - id: opmodel.shared_services.ssc_pos_per_fte_annual
      - id: opmodel.shared_services.plant_pos_per_fte_annual

    confidence_drivers:
      high: "Industry overlay benchmarks loaded + PO count complete + QRE-confirmed cost-per-PO"
      medium: "Function defaults applied (no industry overlay) OR QRE missing"
      low: "Significant PO data gaps"

    coverage: Build 1

  - id: opmodel.shared_services.ss5_reconciliation
    pillar: op-model
    theme: shared-services
    purpose: "Cross-check data-driven SSC recommendation with QRE responses; surface alignment or deviation."

    data_required: []  # synthesises from SS1-SS4 + QRE

    data_cleaning_dependencies: []

    category_classification_required: false

    qre_questions_used:
      - id: Q-OM-SS-01
        consumed_from: opmodel.shared_services.ss0_current_coverage
      - id: Q-OM-SS-02
        consumed_from: opmodel.shared_services.ss0_current_coverage

    industry_overlay_required: []

    benchmarks_consumed: []

    coverage: Build 1

      # ============================================================================
      # OP MODEL — TAIL SPEND THEME
      # ============================================================================

  - id: opmodel.tail_spend.ts0_current_tail_management
    pillar: op-model
    theme: tail-spend
    purpose: "Capture current aggregator usage and tail-handling approach (qualitative baseline)."

    data_required: []  # QRE-only

    data_cleaning_dependencies: []

    category_classification_required: false

    qre_questions_used:
      - id: Q-OM-TS-01
        question: "Does your organisation use any managed-procurement aggregator today (Moglix / Bizongo / Industrybuying / Power2SME / OfBusiness / other)?"
        answer_type: enum
        options: [Yes, No, Partial]
        compulsory: true
      - id: Q-OM-TS-02
        question: "If yes, which aggregator(s)? Which categories? Approximate annual spend through them?"
        answer_type: free_text_plus_checklist
        compulsory: conditional  # if Q-OM-TS-01 ≠ No
      - id: Q-OM-TS-03
        question: "Approximately what % of your indirect spend would you classify as 'tail' — low value, low frequency, scattered vendor base?"
        answer_type: range_band
        options: ["<5%", "5-10%", "10-20%", "20%+", "Don't know"]
        compulsory: false
      - id: Q-OM-TS-04
        question: "Are there reasons aggregator use is restricted (procurement policy, supplier diversity goals, IT integration limits, contractual constraints)?"
        answer_type: free_text
        compulsory: false

    industry_overlay_required: []

    benchmarks_consumed: []

    confidence_drivers:
      high: "All 4 QRE questions answered + aggregator scope clearly stated"
      medium: "Aggregator exists but partial info on scope/spend"
      low: "Client doesn't know tail % or aggregator scope precisely"

    coverage: Build 1

  - id: opmodel.tail_spend.ts1_quantification
    pillar: op-model
    theme: tail-spend
    purpose: "Size the tail using two complementary methods: PO-based threshold (Method A) + category-based Q3 quadrant from SS1 (Method B)."

    data_required:
      - file: PO
        fields:
          - po_id (key)
          - po_value (numeric)
          - category (post-Stage-9)
          - vendor_id
        criticality: critical

    data_cleaning_dependencies:
      - rule: data_quality_universal.normalise_numeric_format
      - rule: procurement.po_value_currency_normalised
      - rule: procurement.category_aligned_to_industry_taxonomy

    category_classification_required: true

    qre_questions_used: []

    industry_overlay_required:
      - "tail_po_threshold_inr_lakh (industry-specific tail PO size cutoff)"

    benchmarks_consumed: []

    upstream_dependencies:
      - id: opmodel.shared_services.ss1_volume_value_quadrant
        usage: "Method B consumes Q3 (Tail) quadrant from SS1"

    confidence_drivers:
      high: "Stage 9 ≥ 90% + PO data complete + SS1 quadrant computed"
      medium: "Stage 9 80-90% + Method A available but Method B partial"
      low: "Stage 9 < 80% — tail boundaries unreliable"

    coverage: Build 1

  - id: opmodel.tail_spend.ts2_vendor_footprint
    pillar: op-model
    theme: tail-spend
    purpose: "Describe vendor pareto in the tail (insight, not decision-driving)."

    data_required:
      - file: PO
        fields: [po_id, po_value, vendor_id, vendor_name]
        criticality: critical for the insight; analysis can skip if missing

    data_cleaning_dependencies:
      - rule: procurement.vendor_dedup_semantic
        notes: "Vendor master deduplication critical to accurate vendor counts"

    category_classification_required: true

    qre_questions_used: []

    industry_overlay_required: []

    benchmarks_consumed: []

    confidence_drivers:
      high: "Vendor master fully deduped"
      medium: "Vendor master partially deduped"
      low: "Vendor master not deduped — counts overstated"

    coverage: Build 1

  - id: opmodel.tail_spend.ts3_industry_filter
    pillar: op-model
    theme: tail-spend
    purpose: "Tag Q3 tail categories as Aggregator-Suitable / Consolidate-Internally / Not-Addressable using industry overlay."

    data_required:
      - file: PO
        fields: [category (post-Stage-9), po_value]
        criticality: critical

    data_cleaning_dependencies:
      - rule: procurement.category_aligned_to_industry_taxonomy

    category_classification_required: true

    qre_questions_used:
      - id: Q-OM-TS-EXC
        question: "Are there any tail categories your team feels CANNOT be outsourced to an aggregator for reasons not captured in your data?"
        answer_type: free_text
        compulsory: false

    industry_overlay_required:
      - "tail-spend-filters.yml — aggregator_suitable list"
      - "tail-spend-filters.yml — consolidate_internally list"
      - "tail-spend-filters.yml — not_addressable list"
      - "tail-spend-filters.yml — tail_po_threshold_inr_lakh + min_aggregator_addressable_spend_inr_cr"

    benchmarks_consumed: []

    confidence_drivers:
      high: "Industry overlay loaded + categories well-matched + Q-OM-TS-EXC reviewed"
      medium: "Some categories unlisted (default to Consolidate-Internally)"
      low: "Industry overlay missing → analysis falls back to function default (no industry filter)"

    coverage: Build 1

  - id: opmodel.tail_spend.ts4_outsourcing_savings
    pillar: op-model
    theme: tail-spend
    purpose: "Compute ₹ Cr/year outsourcing savings for Aggregator-Suitable tail spend (net of any existing aggregator scope)."

    data_required:
      - file: PO
        fields: [po_value, category (post-Stage-9)]
        criticality: critical

    data_cleaning_dependencies:
      - rule: procurement.po_value_currency_normalised

    category_classification_required: true

    qre_questions_used:
      - id: Q-OM-TS-02
        consumed_from: opmodel.tail_spend.ts0_current_tail_management
        usage: "Existing aggregator scope deducted from addressable tail before applying savings rate"

    industry_overlay_required:
      - "Steel overlay outsourcing_savings_rate: opmodel.tail_spend.outsourcing_savings_rate [4, 7]%"
      - "Function default fallback: opmodel.tail_spend.outsourcing_savings_rate [3, 8]%"

    benchmarks_consumed:
      - id: opmodel.tail_spend.outsourcing_savings_rate
        from_file: proc-app/kb/functions/procurement/op-model/benchmarks.yml
        with_industry_overlay: industries/<ind>/by-function/procurement/op-model/benchmarks.yml

    confidence_drivers:
      high: "Industry overlay rate available + Stage 9 classification ≥ 90% + QRE-confirmed existing aggregator scope"
      medium: "Function default rate applied (no industry overlay) OR QRE missing"
      low: "Stage 9 < 80% — addressable spend unreliable"

    coverage: Build 1

  - id: opmodel.tail_spend.ts5_reconciliation
    pillar: op-model
    theme: tail-spend
    purpose: "Cross-check data-driven tail outsourcing recommendation with QRE responses; surface alignment or deviation."

    data_required: []  # synthesises from TS1-TS4 + QRE

    data_cleaning_dependencies: []

    category_classification_required: false

    qre_questions_used:
      - id: Q-OM-TS-01
        consumed_from: opmodel.tail_spend.ts0_current_tail_management
      - id: Q-OM-TS-02
        consumed_from: opmodel.tail_spend.ts0_current_tail_management
      - id: Q-OM-TS-03
        consumed_from: opmodel.tail_spend.ts0_current_tail_management
      - id: Q-OM-TS-04
        consumed_from: opmodel.tail_spend.ts0_current_tail_management

    industry_overlay_required: []

    benchmarks_consumed: []

    coverage: Build 1

      # ============================================================================
      # OP MODEL — CoE THEME
      # ============================================================================

  - id: opmodel.coe.ce0_current_state
    pillar: op-model
    theme: coe
    purpose: "Capture current CoE / strategic-category-management scope (qualitative baseline)."

    data_required: []  # QRE-only

    data_cleaning_dependencies: []

    category_classification_required: false

    qre_questions_used:
      - id: Q-OM-COE-01
        question: "Does your organisation have a formal procurement Centre of Excellence (CoE) — a dedicated team owning strategy for top categories?"
        answer_type: enum
        options: [Yes, No, Informal-Only]
        compulsory: true
      - id: Q-OM-COE-02
        question: "If yes, which categories does the CoE cover? How many?"
        answer_type: free_text_plus_checklist
        compulsory: conditional  # if Q-OM-COE-01 ≠ No
      - id: Q-OM-COE-03
        question: "How many FTEs sit in the CoE (or perform CoE-equivalent work informally)?"
        answer_type: count_band
        options: ["0", "1-3", "4-8", "9-15", "16+"]
        compulsory: conditional
      - id: Q-OM-COE-04
        question: "How is the CoE positioned in the org — reporting line, BU-aligned vs corporate, decision authority?"
        answer_type: free_text
        compulsory: false

    industry_overlay_required: []

    benchmarks_consumed: []

    confidence_drivers:
      high: "All 4 QRE questions answered"
      medium: "CoE exists but partial info on scope/FTE"
      low: "Client doesn't know CoE scope precisely"

    coverage: Build 1

  - id: opmodel.coe.ce1_strategic_identification
    pillar: op-model
    theme: coe
    purpose: "Identify strategic categories using three lenses: SS1 Q4 quadrant + industry strategic-by-nature overlay + vendor concentration."

    data_required:
      - file: PO
        fields:
          - po_id (key)
          - po_value (numeric)
          - category (post-Stage-9)
          - vendor_id
