  - id: orgstructure.fte_sizing.ft2_pos_per_fte
    pillar: org-structure
    theme: fte-sizing-role-composition
    purpose: |
      Two-view component:
      - FT2-overall: Total POs / Total FTE — reliable, always reported
      - FT2-by-role: Per-role POs/FTE — runs only if role classification ≥ 80%
        High confidence AND buyer_id/cost_centre on POs joinable to Org excel
      Cross-links to Op Model SSC theme in commentary only — no quantified linkage.

    feasibility: mixed
    feasibility_breakdown:
      ft2_overall: reliable
      ft2_by_role: semi-reliable
    skip_if_data_missing: |
      FT2-overall: Skip only if total POs OR total FTE unavailable.
      FT2-by-role: Skip if EITHER role classification < 80% High confidence
        OR PO-to-FTE join not feasible (buyer_id generic / missing on >50% POs
        AND cost_centre not mappable to entity+role).
      In typical Indian Steel engagements, FT2-by-role is OFTEN skipped because
      SAP buyer_id is generic (e.g., "PR_DEPT") rather than individual.

    data_required:
      - file: PO
        fields: [po_id]
        criticality: critical_for_overall
      - file: Org_Structure_OR_Employee_Master_OR_QRE_Q-OS-FT-01
        fields: [total_active_procurement_FTE_count]
        criticality: critical_for_overall
      - file: PO  # for by-role view only
        fields: [buyer_id, cost_centre]
        criticality: critical_for_by_role_view_only
        notes: "Often generic/missing in Indian Steel SAP — by-role view skipped if so"
      - file: Org_Structure_OR_Employee_Master  # for by-role view only
        fields: [employee_id, role_title, classified_role_type, classified_confidence]
        criticality: critical_for_by_role_view_only
        notes: "Requires ≥80% High classification confidence"

    data_cleaning_dependencies:
      - rule: procurement.org_role_title_canonicalised
        applies_to: ft2_by_role
      - rule: procurement.po_buyer_or_cost_centre_to_org_join_done
        applies_to: ft2_by_role
        notes: "Each PO joinable to an Org FTE via buyer_id OR cost_centre for by-role attribution"

    category_classification_required: true   # for role-type-level PO attribution clarity

    qre_questions_used: []

    industry_overlay_required: []

    benchmarks_consumed:
      - id: org.fte_productivity.pos_per_fte_category_mgr
      - id: org.fte_productivity.pos_per_fte_transactional
        # SSC benchmarks consumed from Op Model — see cross-link below

    cross_theme_commentary:
      with_theme: op-model.shared-services
      logic: |
        If transactional POs/FTE is materially below benchmark, narrative
        includes commentary noting Op Model SSC theme analyses operational
        redesign. NO quantified linkage. NO ₹ savings derived in this theme.

    explicit_boundary: |
      Cross-link to Op Model SSC theme is COMMENTARY ONLY. No quantified
      linkage. No ₹ savings or productivity uplift computed here.

    confidence_drivers:
      high: "PO-to-FTE join clean + role titles canonicalised + Stage 9 ≥ 90%"
      medium: "Some PO-FTE attribution ambiguous"
      low: "Buyer_id / cost_centre missing on many POs OR role titles unclear"

    coverage: Build 1

