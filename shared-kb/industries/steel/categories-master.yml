# =============================================================================
# Steel Industry — Categories Master Taxonomy
# =============================================================================
# Canonical category list for Stage 9 (Category Classification).
# Schema reference: kb/functions/procurement/data-cleansing/categories-master-schema.md
#
# Coverage target: every Material_Group_Desc value in the demo steel PO seed
# maps to exactly one canonical via Tier A (HSN), Tier C (keywords/synonyms),
# Tier D (vendor specialisation), or Tier E (G/L patterns).
# =============================================================================

metadata:
  id: steel-categories-master
  industry: steel
  version: 1.0
  source: "ACN Procurement Benchmark — Steel; supplemented with HSN code references from CBIC GST schedules"
  source_year: 2024
  last_updated: 2026-05-30
  confidence: high

canonicals:

  # ============== BULK RAW MATERIALS ==============

  - id: iron_ore
    label: "Iron Ore"
    archetype: BULK
    direct_indirect: D
    keywords: [iron ore, fe ore, ore lump, ore fines, ore pellet, hematite, magnetite, pellet feed]
    synonyms: [IO, iron_ore_lumps, iron_ore_fines, iron_ore_pellets]
    hsn_codes: ["2601", "260111", "260112", "260120"]
    vendor_specialisation_examples: [NMDC, SAIL Mining, ESSEL Mining, Vedanta Iron Ore, JSPL Mining, Rungta Mines]
    sap_signals:
      mtart: [ROH]
      pstyp_excluded: [B, K]
      gl_patterns: ["5101%", "510101%"]
    typical_spend_share_pct: [18, 28]
    typical_kpis: [rc_adoption, savings_over_lpo, otd]
    notes: "Largest single category. Lumps + fines + pellets variants. Long-term contracts with state-owned + private miners."

  - id: coking_coal
    label: "Coking Coal"
    archetype: BULK
    direct_indirect: D
    keywords: [coking coal, met coal, metallurgical coal, hard coking, semi soft coking, pci coal]
    synonyms: [CC, met_coal, HCC, SSCC]
    hsn_codes: ["2701", "270111", "270112"]
    vendor_specialisation_examples: [BHP, Glencore, Anglo American, Peabody, Coal India, Adani Resources, BMA]
    sap_signals:
      mtart: [ROH]
      pstyp_excluded: [B, K]
      gl_patterns: ["5102%"]
    typical_spend_share_pct: [12, 20]
    typical_kpis: [rc_adoption, savings_over_lpo]
    notes: "Imported (AUS premium) or domestic. Quality grades critical."

  - id: thermal_coal
    label: "Thermal Coal (Power & Process)"
    archetype: BULK
    direct_indirect: I
    keywords: [thermal coal, steam coal, non coking coal, grade a, grade b, grade c, washery rejects]
    synonyms: [TC, steam_coal, NCC]
    hsn_codes: ["270119", "270120"]
    vendor_specialisation_examples: [Coal India, SCCL, NLCIL, Adani Power]
    sap_signals:
      mtart: [ROH, HIBE]
      pstyp_excluded: [B, K]
      gl_patterns: ["5103%"]
    typical_spend_share_pct: [4, 10]
    typical_kpis: [rc_adoption, savings_over_lpo]
    notes: "Power generation + DRI kiln fuel. Grade A/B/C distinction."

  - id: limestone_dolomite
    label: "Limestone, Dolomite, Flux"
    archetype: BULK
    direct_indirect: D
    keywords: [limestone, dolomite, flux, quartzite, lime, bf flux]
    synonyms: [LS, dolo, flux_stone]
    hsn_codes: ["2521", "2518", "2506"]
    vendor_specialisation_examples: [Birla Corporation, OCL India, Saurashtra Lime, KJS Mining]
    sap_signals:
      mtart: [ROH]
      pstyp_excluded: [B, K]
      gl_patterns: ["5104%"]
    typical_spend_share_pct: [2, 5]
    typical_kpis: [otd, rc_adoption]
    notes: "Local sourcing typical. Logistics-sensitive. Includes blast-furnace quartzite."

  - id: scrap_steel
    label: "Steel Scrap"
    archetype: BULK
    direct_indirect: D
    keywords: [scrap, steel scrap, hms, heavy melt, shredded scrap, melting scrap, turning scrap]
    synonyms: [HMS, HMS1, HMS2, scrap_iron]
    hsn_codes: ["7204", "720410", "720441", "720449"]
    vendor_specialisation_examples: [MMK Metalik, Adsil, Bhagwati Recycling, Tube Investments]
    sap_signals:
      mtart: [ROH]
      pstyp_excluded: [B, K]
      gl_patterns: ["5105%"]
    typical_spend_share_pct: [3, 8]
    typical_kpis: [savings_over_lpo, supplier_defect_rate]
    notes: "EAF / mini-mill input. Spot-heavy. HMS-1 / HMS-2 grade split."

