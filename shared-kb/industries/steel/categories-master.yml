# =============================================================================
# Steel Industry — Categories Master Taxonomy (v1.1)
# =============================================================================
# Canonical category list for Stage 9 (Category Classification).
# Each canonical now carries:
#   - keywords / synonyms — for Tier C text scan (matched across 8 columns)
#   - hsn_codes — Tier A direct lookup
#   - vendor_specialisation_examples — Tier D corroboration
#   - external_mg_codes — Tier B2 direct EXTWG map (KB-declared)
#   - bismt_prefixes — Tier B3 legacy code prefix lookup
#   - sap_signals.mtart / pstyp_excluded / pstyp_allowed
#   - recommendation — Centralisation tag (centralise / centre_led / keep_local / review)
#   - ssc_recommendation — Shared Services tag (suitable / unsuitable / centre_handled / review)
#   - coe_recommendation — CoE tag (coe_suitable / already_strategic / plant_owned)
#   - tail_recommendation — Tail Spend tag (aggregator_suitable / consolidate_internally / not_addressable)
# =============================================================================

