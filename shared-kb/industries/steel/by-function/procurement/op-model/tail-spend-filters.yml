# =============================================================================
# Steel Industry — Tail Spend Filters (Op Model)
# =============================================================================
# Purpose: Steel-specific tagging for Q3 tail candidates from TS1.
#      Tags as Aggregator-Suitable / Consolidate-Internally / Not-Addressable.
# =============================================================================

metadata:
  id: steel-tail-spend-filters
  layer: industry
  industry: steel
  function: procurement
  pillar: op-model
  theme: tail-spend
  version: 1.0
  last_updated: 2026-05-27

# =============================================================================
# THRESHOLDS
# =============================================================================

tail_po_threshold_inr_lakh: 1
  # POs below ₹1 lakh considered tail individually (Method A in TS1)
min_aggregator_addressable_spend_inr_cr: 0.5
  # Below ₹0.5 Cr annual spend, aggregator setup overhead exceeds benefit
tail_spend_share_threshold_pct: 5
  # Indicative cumulative tail share — bottom 5% of spend by value

# =============================================================================
# AGGREGATOR-SUITABLE — Tail categories ideal for managed-procurement outsourcing
# =============================================================================

aggregator_suitable:

  - category_pattern: "indirect.printing_stationery"
reason: "Standardised SKUs; available across all aggregator catalogues — Moglix, Industrybuying. Easy first move."
typical_aggregators: [Moglix, Industrybuying]

  - category_pattern: "indirect.mro.consumables_common_tail"
reason: "Generic MRO items falling in tail by ticket size (small POs for fasteners, gaskets, valves, basic instrumentation, lubricants). Moglix specialty."
typical_aggregators: [Moglix, Industrybuying]

  - category_pattern: "indirect.lab_consumables_general"
reason: "Standard lab consumables — glassware, pipettes, general reagents, filter papers. Aggregator catalogues cover well."
typical_aggregators: [Moglix]

  - category_pattern: "indirect.ppe_consumables_top_up"
reason: "Top-up PPE purchases outside central rate contract. Aggregator catalogue handles one-off/replenishment POs."
typical_aggregators: [Moglix, Industrybuying]

  - category_pattern: "indirect.it.peripherals_consumables"
reason: "Cables, adapters, peripherals, mice, keyboards, headsets — small repeat purchases."
typical_aggregators: [Moglix, Industrybuying]

  - category_pattern: "indirect.facilities.pantry_supplies_top_up"
reason: "Top-up pantry items outside central contract. Aggregator + auto-replenishment."
typical_aggregators: [Moglix, Industrybuying]

  - category_pattern: "indirect.subscription_software_minor"
reason: "Small SaaS subscriptions / online tools for individual teams. Aggregator-mediated procurement + central visibility."

  - category_pattern: "indirect.miscellaneous_indirects"
reason: "Catch-all small POs (small repairs, one-off equipment, sundry supplies). Aggregator + catalog buying / p-card."

# =============================================================================
# CONSOLIDATE-INTERNALLY — Tail better served by vendor consolidation
# =============================================================================

consolidate_internally:

  - category_pattern: "indirect.mro.specialty_consumables_tail"
reason: "Specialty consumables (mill-specific lubricants, niche industrial chemicals) — aggregator catalogue too generic; internal vendor consolidation."

  - category_pattern: "indirect.lab_chemicals_specialty_tail"
reason: "Specialty analytical chemicals (rare reagents, specific metallurgical testing standards). Spec-sensitive."

  - category_pattern: "indirect.facilities.amc_local_tail"
reason: "Tail AMC contracts (small equipment AMCs at specific plants). Plant-local expertise + state contract labour considerations."

  - category_pattern: "indirect.engineering_services_minor"
reason: "Small engineering / drafting / design services tail. Need technical fit; consolidate to approved-vendor panel."

  - category_pattern: "indirect.training_external_tail"
reason: "Small external training programs / niche skill courses. L&D-led vendor panel."

# =============================================================================
# NOT-ADDRESSABLE — Tail that must stay direct-managed
# =============================================================================

not_addressable:

  - category_pattern: "indirect.mro.emergency_breakdown_spares"
reason: "Emergency spares — lead-time critical (hours). Aggregator's batch fulfilment unsuitable even at low ticket size."

  - category_pattern: "direct.process_inputs.refractories_minor_topups"
reason: "Refractory top-up POs spec-sensitive even at small ticket size. Plant metallurgist judgment."

  - category_pattern: "indirect.facilities.security_services"
reason: "Plant-specific manpower, state-licensed agencies. Cannot be aggregator-mediated."

  - category_pattern: "indirect.facilities.canteen_services"
reason: "Local canteen contractors per plant; plant-specific menu + workforce preferences."

  - category_pattern: "indirect.statutory_consultancy_fees_minor"
reason: "Small legal / statutory / regulatory consultancy spend tail. Direct engagement; aggregator not relevant."

  - category_pattern: "indirect.utilities.water_chemicals_local_tail"
reason: "Plant-specific water treatment chemicals (varies by source). Local supplier base + quick replacement essential."
