conversion:
  source: "External — Reserve Bank of India reference rate (daily)"
  refresh_cadence: "daily at 18:30 IST"
  fallback_source: "Open Exchange Rates API"
  storage_in_db: "Daily snapshot in fx_rates table; engagement uses date-of-engagement rate by default"
  display_rule: "When showing converted values, always show source rate + date used for transparency"
