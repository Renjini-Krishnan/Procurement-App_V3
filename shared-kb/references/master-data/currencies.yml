# =============================================================================
# Currencies — Universal Master Data
# =============================================================================
# Currency definitions used by the app for display formatting, multi-currency
# engagements, benchmark normalisation.
# =============================================================================

metadata:
  id: currencies
  layer: universal
  applies_to: all-functions-all-industries
  version: 1.0
  updated: 2026-05-27
  owner: kb-admin
  default_currency: INR

currencies:

  - code: INR
name: Indian Rupee
symbol: "₹"
symbol_position: before
decimal_places: 2
decimal_separator: "."
thousands_separator: ","
numbering_system: indian
common_units:
  - { name: "lakh", multiplier: 100000, display: "L" }
  - { name: "crore", multiplier: 10000000, display: "Cr" }
iso_4217: INR
countries: [IN]
common_in_procurement: true

