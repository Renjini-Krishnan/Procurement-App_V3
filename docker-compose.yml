services:
  procvault:
    build: .
    image: procvault:latest
    container_name: procvault
    restart: unless-stopped
    environment:
      PROCVAULT_LOG_JSON: "1"
      PROCVAULT_LOG_LEVEL: "INFO"
      PROCVAULT_DB_PATH: "/data/procvault.db"
    volumes:
      - procvault-data:/data
      - procvault-uploads:/app/proc-app/backend/data/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  procvault-data:
  procvault-uploads:
